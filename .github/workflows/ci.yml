name: CI/CD — Testes, Qualidade e Deploy

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main, homolog]

jobs:
  ci:
    name: Testes e Qualidade
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./receitas-app

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: receitas_test
          POSTGRES_USER: receitas_user
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, mbstring, xml, zip
          coverage: xdebug

      - name: Instalar dependências (Composer)
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env de teste
        run: cp .env.example .env.testing

      - name: Gerar chave da aplicação
        run: php artisan key:generate --env=testing
        env:
          APP_ENV: testing

      - name: Executar Migrations
        run: php artisan migrate --env=testing --force
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: receitas_test
          DB_USERNAME: receitas_user
          DB_PASSWORD: secret

      - name: Executar Testes Automatizados (20 testes)
        run: php artisan test --env=testing
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: receitas_test
          DB_USERNAME: receitas_user
          DB_PASSWORD: secret

      - name: Análise de Qualidade de Código (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Build da imagem Docker
        run: docker build -t receitas-app:${{ github.sha }} ../

  deploy_homolog:
    name: Deploy Homologação
    needs: ci
    if: github.ref == 'refs/heads/homolog' && github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy Homologação
        run: |
          cd ~/Receitas-Laravel
          git pull origin homolog
          sudo docker compose -f docker-compose.homolog.yml up -d --build
          sudo docker compose -f docker-compose.homolog.yml exec app php artisan migrate --force

      - name: Verificar aplicação
        run: curl -f http://177.44.248.48:8080 || exit 1

  deploy_prod:
    name: Deploy Produção
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy Produção
        run: |
          cd ~/Receitas-Laravel
          git pull origin main
          sudo docker compose -f docker-compose.prod.yml up -d --build
          sudo docker compose -f docker-compose.prod.yml exec app php artisan migrate --force

      - name: Verificar aplicação
        run: curl -f http://177.44.248.48:8081 || exit 1