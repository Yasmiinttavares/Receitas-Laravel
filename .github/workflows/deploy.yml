name: CD — Deploy Homologação e Produção

on:
  push:
    branches: [homolog, main]
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente de deploy'
        required: true
        type: choice
        options: [homolog, prod]

jobs:
  deploy_homolog:
    name: Deploy → Homologação
    if: github.ref == 'refs/heads/homolog'
    runs-on: self-hosted
    environment: homologacao

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy Homologação
        run: ./scripts/deploy.sh homolog

      - name: Verificar aplicação
        run: curl -f http://177.44.248.48:8080 || exit 1

      - name: Abrir Pull Request para main
        uses: repo-sync/pull-request@v2
        with:
          source_branch: homolog
          destination_branch: main
          pr_title: "Promover homolog para produção"
          pr_body: "CI aprovado em homologação. Aguardando aprovação para produção."
          github_token: ${{ secrets.GITHUB_TOKEN }}

  deploy_prod:
    name: Deploy → Produção
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: producao

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy Produção
        run: ./scripts/deploy.sh prod

      - name: Verificar aplicação
        run: curl -f http://177.44.248.48:8081 || exit 1
